services:
  - type: web
    name: sofia-griin
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        value: +19787966556
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PORT
        value: 8000
